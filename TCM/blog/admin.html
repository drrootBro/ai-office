<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博士专栏 · 文章管理 · Rootbro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1612;--ink-soft:#4a453f;--ink-muted:#8a857d;
  --paper:#faf8f4;--paper-card:#fffdf9;
  --brush:#8b3a2a;--brush-light:rgba(139,58,42,0.08);
  --teal:#2a6b5e;--teal-light:rgba(42,107,94,0.08);
  --gold:#b8942a;--gold-light:rgba(184,148,42,0.1);
  --green:#2a5c3a;--green-light:rgba(42,92,58,0.10);
  --border:rgba(26,22,18,0.10);--border-warm:rgba(139,58,42,0.15);
}
body{font-family:'Georgia',serif;background:var(--paper);color:var(--ink);min-height:100vh}
.wrap{max-width:780px;margin:0 auto;padding:48px 32px 80px}

.topbar{display:flex;align-items:center;gap:12px;margin-bottom:40px}
.topbar-brand{font-family:monospace;font-size:11px;letter-spacing:.25em;color:var(--brush);text-transform:uppercase}
.topbar-rule{flex:1;height:1px;background:var(--border)}
.topbar-sub{font-family:monospace;font-size:10px;letter-spacing:.2em;color:var(--ink-muted)}

/* config panel */
.config-panel{background:var(--paper-card);border:1px solid var(--border-warm);border-radius:4px;padding:20px 24px;margin-bottom:24px}
.config-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.config-title{font-family:monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--brush)}
.config-status{font-family:monospace;font-size:10px;color:var(--ink-muted);display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-muted)}
.status-dot.ok{background:var(--green)}
.config-body{margin-top:16px;display:none;flex-direction:column;gap:12px}
.config-body.open{display:flex}
.cfg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cfg-field label{font-family:monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-muted);display:block;margin-bottom:5px}
.cfg-field input{width:100%;font-family:monospace;font-size:12px;color:var(--ink);background:var(--paper);border:1px solid var(--border);padding:8px 10px;border-radius:2px;outline:none;transition:border-color .18s}
.cfg-field input:focus{border-color:var(--brush)}
.cfg-field input[type=password]{letter-spacing:.1em}
.save-cfg{font-family:monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:7px 16px;border:1px solid var(--brush);border-radius:1px;background:transparent;color:var(--brush);cursor:pointer;transition:all .15s;align-self:flex-start}
.save-cfg:hover{background:var(--brush-light)}

/* form sections */
.form-section{background:var(--paper-card);border:1px solid var(--border);padding:24px 24px 20px;margin-bottom:2px}
.section-label{font-family:monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{font-family:monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-muted);display:block;margin-bottom:5px}
.field input,.field textarea{width:100%;font-family:'Georgia',serif;font-size:14px;color:var(--ink);background:var(--paper);border:1px solid var(--border);padding:10px 14px;border-radius:2px;outline:none;transition:border-color .18s;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--brush)}
.field textarea{line-height:1.8}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.tag-group{display:flex;gap:8px;flex-wrap:wrap}
.tag-btn{font-family:monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);border-radius:1px;cursor:pointer;background:transparent;color:var(--ink-muted);transition:all .15s}
.tag-btn.sel-case{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.tag-btn.sel-theory{border-color:var(--gold);color:var(--gold);background:var(--gold-light)}
.tag-btn.sel-herb{border-color:var(--brush);color:var(--brush);background:var(--brush-light)}

/* publish button */
.publish-btn{width:100%;font-family:monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:16px;border:none;background:var(--brush);color:#faf8f4;cursor:pointer;border-radius:0 0 4px 4px;transition:opacity .2s;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:10px}
.publish-btn:hover{opacity:.88}
.publish-btn:disabled{opacity:.4;cursor:not-allowed}
.spinner{width:14px;height:14px;border:2px solid rgba(250,248,244,0.3);border-top-color:#faf8f4;border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* status message */
.status-msg{margin-top:16px;padding:14px 18px;border-radius:2px;font-family:monospace;font-size:12px;line-height:1.6;display:none}
.status-msg.show{display:block}
.status-msg.success{background:var(--green-light);border:1px solid rgba(42,92,58,0.2);color:var(--green)}
.status-msg.error{background:rgba(139,58,42,0.06);border:1px solid var(--border-warm);color:var(--brush)}
.status-msg.loading{background:rgba(184,148,42,0.06);border:1px solid rgba(184,148,42,0.18);color:var(--gold)}

/* preview */
.preview-wrap{margin-top:24px;display:none}
.preview-wrap.show{display:block}
.preview-label{font-family:monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.preview-label::after{content:'';flex:1;height:1px;background:var(--border)}
.preview-card{background:var(--paper-card);border:1px solid var(--border);padding:18px;border-radius:2px}
.preview-tag-el{font-family:monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:2px 7px;border:1px solid;border-radius:1px;display:inline-block;margin-bottom:8px}
.pt-case{color:var(--teal);border-color:var(--teal);background:var(--teal-light)}
.pt-theory{color:var(--gold);border-color:var(--gold);background:var(--gold-light)}
.pt-herb{color:var(--brush);border-color:var(--brush);background:var(--brush-light)}
.preview-title-el{font-size:18px;font-weight:400;color:var(--ink);margin-bottom:5px;line-height:1.35}
.preview-excerpt-el{font-size:13px;color:var(--ink-soft);line-height:1.85;margin-bottom:8px}
.preview-date-el{font-family:monospace;font-size:10px;color:var(--ink-muted)}

@media(max-width:540px){
  .wrap{padding:32px 16px 60px}
  .row,.cfg-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <span class="topbar-brand">Rootbro</span>
    <div class="topbar-rule"></div>
    <span class="topbar-sub">博士专栏 · 文章管理后台</span>
  </div>

  <!-- GitHub 配置 -->
  <div class="config-panel">
    <div class="config-toggle" id="config-toggle">
      <span class="config-title">GitHub 配置</span>
      <span class="config-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">未配置</span>
      </span>
    </div>
    <div class="config-body" id="config-body">
      <div class="cfg-row">
        <div class="cfg-field">
          <label>GitHub 用户名</label>
          <input type="text" id="cfg-user" placeholder="oceanyc">
        </div>
        <div class="cfg-field">
          <label>仓库名</label>
          <input type="text" id="cfg-repo" placeholder="rootbro">
        </div>
      </div>
      <div class="cfg-field">
        <label>blog/index.html 的路径</label>
        <input type="text" id="cfg-path" placeholder="blog/index.html">
      </div>
      <div class="cfg-field">
        <label>Personal Access Token</label>
        <input type="password" id="cfg-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      </div>
      <button class="save-cfg" id="save-cfg">保存配置</button>
    </div>
  </div>

  <!-- 文章表单 -->
  <div class="form-section">
    <div class="section-label">文章信息</div>
    <div class="row">
      <div class="field">
        <label>标题</label>
        <input type="text" id="f-title" placeholder="文章标题">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="month" id="f-date">
      </div>
    </div>
    <div class="field">
      <label>分类标签</label>
      <div class="tag-group">
        <button class="tag-btn" data-tag="case" data-cls="sel-case">临床案例</button>
        <button class="tag-btn" data-tag="theory" data-cls="sel-theory">理论解析</button>
        <button class="tag-btn" data-tag="herb" data-cls="sel-herb">本草笔记</button>
      </div>
    </div>
    <div class="field">
      <label>摘要 <span style="color:var(--ink-muted);letter-spacing:0;text-transform:none;font-size:10px">— 显示在卡片上，50字左右</span></label>
      <textarea id="f-excerpt" rows="2" placeholder="一两句话概括文章核心..."></textarea>
    </div>
  </div>

  <div class="form-section">
    <div class="section-label">正文内容</div>
    <div class="field">
      <label>正文 <span style="color:var(--ink-muted);letter-spacing:0;text-transform:none;font-size:10px">— 空行自动分段，直接粘贴即可</span></label>
      <textarea id="f-body" rows="14" placeholder="直接粘贴文章正文，空一行表示分段。&#10;&#10;可以从 X、喜马拉雅文字稿直接复制过来。"></textarea>
    </div>
  </div>

  <button class="publish-btn" id="publish-btn">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">发布文章 →</span>
  </button>

  <div class="status-msg" id="status-msg"></div>

  <div class="preview-wrap" id="preview-wrap">
    <div class="preview-label">卡片预览</div>
    <div class="preview-card">
      <span class="preview-tag-el" id="pv-tag"></span>
      <div class="preview-title-el" id="pv-title"></div>
      <div class="preview-excerpt-el" id="pv-excerpt"></div>
      <div class="preview-date-el" id="pv-date"></div>
    </div>
  </div>

</div>

<script>
const tagLabels = { case:'临床案例', theory:'理论解析', herb:'本草笔记' };
const tagPtCls  = { case:'pt-case', theory:'pt-theory', herb:'pt-herb' };
let selectedTag = '', selectedCls = '';

// --- config ---
function loadConfig() {
  const u = localStorage.getItem('rb_user');
  const r = localStorage.getItem('rb_repo');
  const p = localStorage.getItem('rb_path') || 'blog/index.html';
  const t = localStorage.getItem('rb_token');
  if (u) document.getElementById('cfg-user').value = u;
  if (r) document.getElementById('cfg-repo').value = r;
  document.getElementById('cfg-path').value = p;
  if (t) document.getElementById('cfg-token').value = t;
  updateStatusDot();
}

function updateStatusDot() {
  const ok = localStorage.getItem('rb_user') && localStorage.getItem('rb_token');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (ok) {
    dot.className = 'status-dot ok';
    txt.textContent = localStorage.getItem('rb_user') + ' / ' + (localStorage.getItem('rb_repo') || '?');
    document.getElementById('config-body').classList.remove('open');
  } else {
    dot.className = 'status-dot';
    txt.textContent = '点击配置';
    document.getElementById('config-body').classList.add('open');
  }
}

document.getElementById('config-toggle').addEventListener('click', () => {
  document.getElementById('config-body').classList.toggle('open');
});

document.getElementById('save-cfg').addEventListener('click', () => {
  const u = document.getElementById('cfg-user').value.trim();
  const r = document.getElementById('cfg-repo').value.trim();
  const p = document.getElementById('cfg-path').value.trim();
  const t = document.getElementById('cfg-token').value.trim();
  if (!u || !r || !t) { alert('请填写用户名、仓库名和 Token'); return; }
  localStorage.setItem('rb_user', u);
  localStorage.setItem('rb_repo', r);
  localStorage.setItem('rb_path', p || 'blog/index.html');
  localStorage.setItem('rb_token', t);
  updateStatusDot();
});

// --- tags ---
document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.className = 'tag-btn');
    btn.className = 'tag-btn ' + btn.dataset.cls;
    selectedTag = btn.dataset.tag;
    selectedCls = btn.dataset.cls;
    updatePreview();
  });
});

function fmtDate(val) {
  if (!val) return '';
  const [y, m] = val.split('-');
  return y + '.' + m;
}

function bodyToHtml(text) {
  return text.trim().split(/\n\s*\n/).map(p => {
    const line = p.trim().replace(/\n/g, ' ');
    return line ? '      <p>' + line + '</p>' : '';
  }).filter(Boolean).join('\n');
}

function updatePreview() {
  const title   = document.getElementById('f-title').value.trim();
  const dateStr = fmtDate(document.getElementById('f-date').value);
  const excerpt = document.getElementById('f-excerpt').value.trim();
  if (!title && !excerpt) return;
  const ptCls = tagPtCls[selectedTag] || 'pt-case';
  document.getElementById('pv-tag').className = 'preview-tag-el ' + ptCls;
  document.getElementById('pv-tag').textContent = tagLabels[selectedTag] || '—';
  document.getElementById('pv-title').textContent = title;
  document.getElementById('pv-excerpt').textContent = excerpt;
  document.getElementById('pv-date').textContent = dateStr;
  document.getElementById('preview-wrap').classList.add('show');
}

['f-title','f-excerpt','f-date'].forEach(id => {
  document.getElementById(id).addEventListener('input', updatePreview);
});

// --- publish ---
function showStatus(type, msg) {
  const el = document.getElementById('status-msg');
  el.className = 'status-msg show ' + type;
  el.innerHTML = msg;
}

function setLoading(on) {
  const btn = document.getElementById('publish-btn');
  const spinner = document.getElementById('spinner');
  const txt = document.getElementById('btn-text');
  btn.disabled = on;
  spinner.className = on ? 'spinner show' : 'spinner';
  txt.textContent = on ? '发布中...' : '发布文章 →';
}

document.getElementById('publish-btn').addEventListener('click', async () => {
  const title   = document.getElementById('f-title').value.trim();
  const dateVal = document.getElementById('f-date').value;
  const excerpt = document.getElementById('f-excerpt').value.trim();
  const body    = document.getElementById('f-body').value.trim();

  if (!title || !selectedTag || !excerpt || !body || !dateVal) {
    showStatus('error', '请填写所有字段并选择标签'); return;
  }

  const user  = localStorage.getItem('rb_user');
  const repo  = localStorage.getItem('rb_repo');
  const path  = localStorage.getItem('rb_path') || 'blog/index.html';
  const token = localStorage.getItem('rb_token');
  if (!user || !token) {
    showStatus('error', '请先配置 GitHub 用户名和 Token'); return;
  }

  setLoading(true);
  showStatus('loading', '正在读取 blog/index.html...');

  try {
    // 1. 获取现有文件
    const apiBase = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
    const getRes = await fetch(apiBase, {
      headers: { Authorization: 'token ' + token, Accept: 'application/vnd.github.v3+json' }
    });
    if (!getRes.ok) throw new Error('无法读取文件，请检查用户名/仓库名/Token 是否正确');
    const fileData = await getRes.json();
    const sha = fileData.sha;
    const currentContent = atob(fileData.content.replace(/\n/g,''));

    // 2. 解析现有最大 id
    const idMatches = [...currentContent.matchAll(/data-id="(\d+)"/g)];
    const maxId = idMatches.length ? Math.max(...idMatches.map(m => parseInt(m[1]))) : 0;
    const newId = maxId + 1;

    const dateStr  = fmtDate(dateVal);
    const tagLabel = tagLabels[selectedTag];
    const ptCls    = tagPtCls[selectedTag];
    const bodyHtml = bodyToHtml(body);
    const metaStr  = tagLabel + ' · ' + dateStr;
    const safeTitle = title.replace(/'/g, "\\'");

    // 3. 生成新卡片 HTML
    const newCard = `
  <div class="post" data-tag="${selectedTag}" data-id="${newId}">
    <div class="post-meta">
      <span class="post-tag ${ptCls}">${tagLabel}</span>
      <span class="post-date">${dateStr}</span>
    </div>
    <div class="post-title">${title}</div>
    <div class="post-excerpt">${excerpt}</div>
    <div class="post-read">阅读全文</div>
  </div>`;

    // 4. 生成新 JS 条目
    const newJs = `  ${newId}: {
    title: '${safeTitle}',
    meta: '${metaStr}',
    body: \`
${bodyHtml}
    \`
  },`;

    // 5. 插入到文件
    const htmlMarker = '<!-- 添加新文章 -->';
    const jsMarker   = '// 新文章在这里继续添加';

    if (!currentContent.includes(htmlMarker) || !currentContent.includes(jsMarker)) {
      throw new Error('找不到插入标记，请确认 blog/index.html 包含正确的注释标记');
    }

    let newContent = currentContent
      .replace(htmlMarker, htmlMarker + newCard)
      .replace(jsMarker, newJs + '\n  ' + jsMarker);

    showStatus('loading', '正在发布到 GitHub...');

    // 6. 推送到 GitHub
    const putRes = await fetch(apiBase, {
      method: 'PUT',
      headers: {
        Authorization: 'token ' + token,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `blog: add "${title}"`,
        content: btoa(unescape(encodeURIComponent(newContent))),
        sha: sha
      })
    });

    if (!putRes.ok) {
      const err = await putRes.json();
      throw new Error(err.message || '推送失败');
    }

    setLoading(false);
    showStatus('success', `✓ 发布成功！文章编号 #${newId}<br>约 30 秒后 GitHub Pages 自动更新`);

    // 清空表单
    document.getElementById('f-title').value = '';
    document.getElementById('f-excerpt').value = '';
    document.getElementById('f-body').value = '';
    document.querySelectorAll('.tag-btn').forEach(b => b.className = 'tag-btn');
    selectedTag = ''; selectedCls = '';

  } catch (e) {
    setLoading(false);
    showStatus('error', '❌ ' + e.message);
  }
});

// init
loadConfig();
document.getElementById('f-date').value = new Date().toISOString().slice(0,7);
</script>
</body>
</html>
