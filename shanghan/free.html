// ── 弹窗 ──────────────────────────────────────────────────
function showPaywall(title) {
  document.getElementById('modalSubText').textContent = title || '完整版包含六经全部内容';
  document.getElementById('modalContent1').style.display = 'block';
  document.getElementById('modalContent2').style.display = 'none';
  document.getElementById('paywallModal').classList.add('show');
}
function closeModal() { document.getElementById('paywallModal').classList.remove('show'); }
function showKeyInput() {
  document.getElementById('modalContent1').style.display = 'none';
  document.getElementById('modalContent2').style.display = 'block';
  document.getElementById('modalKeyInput').value = '';
  document.getElementById('modalKeyError').textContent = '';
}
function showModalMain() {
  document.getElementById('modalContent1').style.display = 'block';
  document.getElementById('modalContent2').style.display = 'none';
}
async function doModalUnlock() {
  const key = document.getElementById('modalKeyInput').value.trim();
  const errEl = document.getElementById('modalKeyError');
  const loadEl = document.getElementById('modalKeyLoading');
  if (!key) { errEl.textContent = '请输入Key'; return; }
  errEl.textContent = '';
  loadEl.style.display = 'block';
  try {
    const res = await fetch(`${API_URL}/verify`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ key })
    });
    const data = await res.json();
    if (data.success) {
      // 直接跳转完整版，URL带Key自动解锁
      window.location.href = 'https://rootbro.com/shanghan?key=' + encodeURIComponent(key);
    } else {
      errEl.textContent = data.error || '验证失败，请检查Key';
    }
  } catch(e) {
    errEl.textContent = '网络错误，请重试';
  } finally {
    loadEl.style.display = 'none';
  }
}
document.getElementById('paywallModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── 六经Tab ───────────────────────────────────────────────
function buildMBar() {
  const bar = document.getElementById('mBar');
  bar.innerHTML = '';
  const FREE = ["太阳","阳明"];
  MERIDIANS.forEach(m => {
    const locked = !FREE.includes(m.id);
    const t = document.createElement('div');
    t.className = 'm-tab' + (m.id === curMeridian.id ? ' active' : '') + (locked ? ' locked' : '');
    t.style.setProperty('--active-color', m.color);
    t.innerHTML = `<div class="m-dot" style="background:${m.color}"></div>${m.name}${locked ? ' 🔒' : ''}`;
    t.onclick = () => {
      if (locked) { showPaywall(`${m.name}需要完整版解锁`); return; }
      curMeridian = m; selections = []; buildMBar(); render();
    };
    bar.appendChild(t);
  });
}

// ── 树渲染 ────────────────────────────────────────────────
function render() {
  const m = curMeridian;
  document.getElementById('panelTitle').textContent = m.name + ' 辨证';
  const body = document.getElementById('treeBody');
  body.innerHTML = '';
  const intro = document.createElement('div');
  intro.className = 'm-intro';
  intro.style.cssText = `background:${m.bg};border-color:${m.color}`;
  intro.innerHTML = `<div class="m-intro-name" style="color:${m.color}">${m.name}</div><div class="m-intro-desc">${m.modern} · ${m.desc}</div>`;
  body.appendChild(intro);
  const resetRow = document.createElement('div');
  resetRow.className = 'reset-row';
  resetRow.innerHTML = `<button class="btn-reset" onclick="resetTree()">↺ 重新选择</button>`;
  body.appendChild(resetRow);
  const treeRoot = document.createElement('div');
  treeRoot.className = 'tree-root';
  renderLevel(m.tree, 0, treeRoot);
  body.appendChild(treeRoot);
}

function renderLevel(node, depth, container) {
  if (!node || !node.q) return;
  const levelEl = document.createElement('div');
  levelEl.className = 'tree-level';
  const qEl = document.createElement('div');
  qEl.className = 'level-question';
  qEl.textContent = node.q;
  levelEl.appendChild(qEl);
  const opts = node.opts || [];
  if (opts.length === 0) { container.appendChild(levelEl); return; }
  const selectedIdx = selections[depth];
  opts.forEach((opt, idx) => {
    const isSelected = selectedIdx === idx;
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (isSelected ? (opt.r ? ' result-selected' : ' selected') : '');
    btn.innerHTML = `<div class="opt-radio"></div><div class="opt-label-wrap"><span class="opt-main">${opt.l}</span>${opt.s?`<span class="opt-sub">${opt.s}</span>`:''}</div>`;
    btn.onclick = () => {
      selections = selections.slice(0, depth);
      selections[depth] = idx;
      render();
      if (opt.r) showResult(opt.r);
      else showResult(null);
    };
    levelEl.appendChild(btn);
    if (isSelected && opt.next) {
      const childWrap = document.createElement('div');
      childWrap.className = 'opt-children';
      renderLevel(opt.next, depth+1, childWrap);
      levelEl.appendChild(childWrap);
    }
    if (isSelected && opt.r) showResult(opt.r);
  });
  container.appendChild(levelEl);
}

  const body = document.getElementById('resultBody');
  if (!name) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><p>请在左侧<br><strong>逐步选择症状</strong><br>系统自动推荐方剂</p></div>`;
    return;

  const f = F[name];
  if (!f) {
    // 找不到方剂数据 = 付费内容
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">🔒</div><p><strong>${name}</strong><br><br>此方剂属于完整版内容<br><br><button onclick="showPaywall('${name}需要完整版')" style="padding:10px 20px;background:var(--red);color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;">解锁完整版</button></p></div>`;
    return;
  }
  const herbsHtml = f.herbs.map(h => `<div class="herb-tag"><b>${h.n}</b><span>${h.a}${h.p?' · '+h.p:''}</span></div>`).join('');
  body.innerHTML = `
    <div class="rc-header">
      <div class="rc-badge" style="background:${f.mc}">${name.slice(0,2)}</div>
      <div><div class="rc-name">${name}</div><div class="rc-modern">${f.modern}</div><span class="rc-pill" style="background:${f.mc}">${f.meridian} · ${f.pulse}</span></div>

    </div>`;
}

    if (isSelected && opt.next) {
      const childWrap = document.createElement('div');
      childWrap.className = 'opt-children';
      renderZhengLevel(opt.next, depth+1, childWrap);
      levelEl.appendChild(childWrap);
    }
    if (isSelected && opt.r) showResult(opt.r);
  });
  container.appendChild(levelEl);
}

function resetZheng() { zhengCat=null; zhengSelections=[]; renderZheng(); showResult(null); }

// ── 初始化 ────────────────────────────────────────────────
buildMBar();
render();
</script>
</body>
