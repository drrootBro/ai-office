<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伤寒论六经辨证</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --ink:#0f1923; --ink2:#3a4a5a;
    --paper:#f0f4f0; --paper2:#e8ede8;
    --blue:#1a3a5c; --blue2:#2a5298; --blue3:#4a7ec8;
    --red:#8b1a1a; --gold:#b8860b; --border:#b8c8b8;
    --shadow:rgba(15,25,15,0.10);
    --ty:#c0392b; --ym:#c07020; --sy:#27ae60;
    --ti:#8e44ad; --sn:#2980b9; --jy:#445588;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Noto Sans SC',sans-serif;
    background:var(--paper); color:var(--ink); min-height:100vh;
    background-image:
      radial-gradient(ellipse at 10% 0%,rgba(139,26,26,.05) 0%,transparent 50%),
      radial-gradient(ellipse at 90% 100%,rgba(26,58,92,.05) 0%,transparent 50%);
  }

  /* HEADER */
  header{
    background:var(--blue); padding:18px 32px;
    display:flex; align-items:center; gap:14px;
    border-bottom:3px solid var(--blue3);
  }
  .seal{
    width:48px;height:48px;background:var(--red);border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif SC',serif;color:white;font-size:17px;
    letter-spacing:-2px;flex-shrink:0;box-shadow:2px 2px 0 rgba(0,0,0,.3);
  }
  header h1{font-family:'Noto Serif SC',serif;color:#e8f0fa;font-size:19px;letter-spacing:3px;}
  header p{color:var(--blue3);font-size:11px;letter-spacing:1px;margin-top:3px;}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .version{background:rgba(74,126,200,.3);color:#a8c8f0;font-size:10px;
    padding:3px 9px;border-radius:10px;border:1px solid rgba(74,126,200,.4);}

  /* MERIDIAN TABS */
  .m-bar{
    background:var(--blue);padding:0 32px;
    display:flex;border-bottom:1px solid rgba(74,126,200,.25);
    overflow-x:auto;
  }
  .m-tab{
    padding:10px 16px;font-size:12px;color:#6888aa;cursor:pointer;
    border-bottom:3px solid transparent;transition:all .2s;
    display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;
  }
  .m-tab:hover{color:#a8c8f0;}
  .m-tab.active{color:white;border-bottom-color:var(--active-color,white);}
  .m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

  /* LAYOUT */
  .container{max-width:1120px;margin:0 auto;padding:20px;}
  .disclaimer{
    background:#e8f0e8;border-left:4px solid var(--blue3);
    padding:9px 13px;border-radius:0 6px 6px 0;
    font-size:11px;color:var(--ink2);margin-bottom:18px;line-height:1.6;
  }
  .layout{display:grid;grid-template-columns:1fr 380px;gap:18px;align-items:start;}

  /* LEFT - TREE */
  .tree-panel{background:white;border:1px solid var(--border);border-radius:8px;
    overflow:hidden;box-shadow:0 2px 10px var(--shadow);}
  .panel-hd{background:var(--blue);padding:12px 18px;display:flex;align-items:center;gap:8px;}
  .panel-hd .hdot{width:7px;height:7px;background:var(--blue3);border-radius:50%;}
  .panel-hd h2{font-family:'Noto Serif SC',serif;color:#e8f0fa;font-size:13px;letter-spacing:2px;}
  .panel-bd{padding:18px;}

  /* MERIDIAN INTRO */
  .m-intro{
    padding:11px 13px;border-radius:6px;border-left:3px solid;
    margin-bottom:16px;
  }
  .m-intro-name{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:700;}
  .m-intro-desc{font-size:11px;color:var(--ink2);margin-top:3px;line-height:1.6;}

  /* RESET BTN */
  .reset-row{margin-bottom:14px;}
  .btn-reset{
    padding:6px 14px;background:white;border:1px solid var(--border);
    border-radius:5px;font-size:11px;color:var(--ink2);cursor:pointer;transition:all .15s;
  }
  .btn-reset:hover{border-color:var(--red);color:var(--red);}

  /* TREE NODES */
  .tree-root{display:flex;flex-direction:column;gap:0;}

  .tree-level{
    display:flex;flex-direction:column;gap:0;
    animation:slideDown .2s ease;
  }
  @keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

  .level-question{
    font-size:13px;font-weight:600;color:var(--blue);
    padding:8px 0 6px;line-height:1.5;
  }

  .opt-row{
    display:flex;align-items:flex-start;gap:0;
    border-radius:6px;overflow:hidden;
    margin-bottom:2px;
  }

  /* the clickable option button */
  .opt-btn{
    flex:1;padding:9px 12px;background:var(--paper);
    border:1.5px solid var(--border);border-radius:6px;
    font-size:12px;color:var(--ink);cursor:pointer;
    text-align:left;transition:all .15s;line-height:1.5;
    display:flex;align-items:center;gap:8px;
  }
  .opt-btn:hover{border-color:var(--blue2);background:#eef4ff;}
  .opt-btn.selected{
    background:#e8f0fb;border-color:var(--blue2);color:var(--blue);
    font-weight:500;
  }
  .opt-btn.result-selected{
    background:#e8f8e8;border-color:var(--sy);color:#1a5a1a;font-weight:500;
  }
  .opt-radio{
    width:14px;height:14px;border-radius:50%;border:2px solid var(--border);
    flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;
  }
  .opt-btn.selected .opt-radio{border-color:var(--blue2);background:var(--blue2);}
  .opt-btn.selected .opt-radio::after{content:'';width:5px;height:5px;border-radius:50%;background:white;}
  .opt-btn.result-selected .opt-radio{border-color:var(--sy);background:var(--sy);}
  .opt-btn.result-selected .opt-radio::after{content:'';width:5px;height:5px;border-radius:50%;background:white;}
  .opt-label-wrap{flex:1;}
  .opt-main{display:block;}
  .opt-sub{display:block;font-size:10px;color:var(--ink2);margin-top:1px;}

  /* children indent */
  .opt-children{
    margin-left:24px;padding-left:12px;
    border-left:2px solid #d8e8d8;
    margin-top:4px;margin-bottom:6px;
  }

  /* RIGHT - RESULT */
  .result-panel{
    background:white;border:1px solid var(--border);border-radius:8px;
    overflow:hidden;box-shadow:0 2px 10px var(--shadow);
    position:sticky;top:16px;
  }
  .empty-state{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:50px 20px;text-align:center;color:var(--ink2);
  }
  .empty-icon{font-size:40px;margin-bottom:12px;opacity:.3;}
  .empty-state p{font-size:12px;line-height:1.9;}

  /* result content */
  .rc-header{
    padding:16px 18px;display:flex;align-items:center;gap:13px;
    border-bottom:2px solid var(--paper2);
  }
  .rc-badge{
    width:46px;height:46px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif SC',serif;color:white;font-size:13px;
    flex-shrink:0;box-shadow:2px 2px 0 rgba(0,0,0,.2);
  }
  .rc-name{font-family:'Noto Serif SC',serif;font-size:20px;letter-spacing:1px;}
  .rc-modern{font-size:11px;color:var(--ink2);margin-top:3px;line-height:1.5;}
  .rc-pill{
    display:inline-block;font-size:10px;padding:2px 7px;
    border-radius:8px;color:white;margin-top:4px;
  }

  .rc-body{padding:14px 18px;}
  .sec{margin-bottom:14px;}
  .sec-lbl{
    font-size:10px;color:var(--gold);letter-spacing:2px;font-weight:700;
    margin-bottom:6px;display:flex;align-items:center;gap:5px;
  }
  .sec-lbl::before{content:'';display:inline-block;width:12px;height:2px;background:var(--gold);}

  .herb-grid{display:flex;flex-wrap:wrap;gap:5px;}
  .herb-tag{
    background:var(--paper);border:1px solid var(--border);
    border-radius:5px;padding:5px 8px;font-size:11px;
  }
  .herb-tag b{display:block;font-size:12px;}
  .herb-tag span{color:var(--ink2);font-size:10px;}

  .prep-box{
    background:#f0f6ff;border:1px solid #b8d0f0;border-radius:5px;
    padding:10px 12px;font-size:12px;line-height:1.8;
  }
  .classic-box{
    background:var(--blue);border-radius:5px;padding:10px 12px;
    font-family:'Noto Serif SC',serif;font-size:11px;color:#a8c8f0;line-height:1.9;
  }
  .classic-src{font-size:10px;color:#6898c0;margin-top:5px;}
  .warn-box{
    background:#fff8f0;border:1px solid #f0c890;border-radius:5px;
    padding:9px 11px;font-size:11px;color:#7a4010;line-height:1.7;
  }

  @media(max-width:800px){
    .layout{grid-template-columns:1fr;}
    .result-panel{position:static;}
    .m-bar{padding:0 12px;}
    .container{padding:12px;}
    header{padding:14px 16px;}
  }

  /* PAYWALL */
  .m-tab.locked{ color:#5a6a7a; opacity:.6; cursor:pointer; }
  .m-tab.locked:hover{ opacity:.9; }
  .m-tab.locked .lock-icon{ font-size:10px; margin-left:2px; }

  .sym-card.locked{
    background:#f4f4f4; border-color:#d0d0d0; cursor:pointer;
    filter:grayscale(0.3); opacity:.7;
  }
  .sym-card.locked:hover{ opacity:.9; transform:none; box-shadow:none; border-color:#aaa; }
  .sym-card.locked .sym-icon{ filter:grayscale(1); }
  .sym-card.locked .sym-name{ color:#888; }
  .sym-card.locked .sym-desc{ color:#aaa; }
  .sym-card.locked .lock-badge{
    display:inline-block; font-size:9px; background:#888;
    color:white; padding:1px 5px; border-radius:8px; margin-top:3px;
  }

  /* MODAL */
  .modal-overlay{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.5); z-index:1000;
    align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:white; border-radius:12px; max-width:400px; width:100%;
    padding:32px 28px; box-shadow:0 8px 40px rgba(0,0,0,.3);
    animation:fadeIn .2s ease;
  }
  .modal-icon{ font-size:36px; text-align:center; margin-bottom:12px; }
  .modal-title{
    font-family:'Noto Serif SC',serif; font-size:18px; color:var(--ink);
    text-align:center; margin-bottom:6px; letter-spacing:1px;
  }
  .modal-sub{ font-size:12px; color:var(--ink2); text-align:center; margin-bottom:20px; line-height:1.6; }
  .modal-features{ background:var(--paper); border-radius:8px; padding:14px; margin-bottom:20px; }
  .modal-feature{ font-size:12px; color:var(--ink2); margin-bottom:6px; display:flex; gap:8px; }
  .modal-feature:last-child{ margin-bottom:0; }
  .modal-btns{ display:flex; flex-direction:column; gap:8px; }
  .modal-btn-buy{
    padding:12px; background:var(--red); color:white; border:none;
    border-radius:7px; font-size:14px; font-family:'Noto Serif SC',serif;
    letter-spacing:1px; cursor:pointer; text-align:center;
    text-decoration:none; display:block; transition:background .2s;
  }
  .modal-btn-buy:hover{ background:#a02020; }
  .modal-btn-key{
    padding:11px; background:white; color:var(--blue2);
    border:1.5px solid var(--blue2); border-radius:7px;
    font-size:13px; cursor:pointer; transition:all .2s;
  }
  .modal-btn-key:hover{ background:#eef4ff; }
  .modal-btn-close{
    padding:9px; background:white; color:var(--ink2);
    border:1px solid var(--border); border-radius:7px;
    font-size:12px; cursor:pointer;
  }

  /* KEY INPUT IN MODAL */
  .modal-key-input{
    width:100%; padding:11px; border:1.5px solid var(--border);
    border-radius:7px; font-size:14px; text-align:center;
    letter-spacing:2px; margin-bottom:8px; text-transform:uppercase;
    font-family:'Noto Sans SC',sans-serif;
  }
  .modal-key-input:focus{ outline:none; border-color:var(--blue2); }
  .modal-key-error{ font-size:11px; color:var(--red); min-height:16px; margin-bottom:8px; text-align:center; }
  .modal-key-loading{ font-size:11px; color:var(--ink2); text-align:center; margin-bottom:8px; display:none; }
  .mode-bar{
    background:#e8ede8; border-bottom:1px solid var(--border);
    display:flex; justify-content:center; padding:10px 20px; gap:8px;
  }
  .mode-btn{
    padding:8px 28px; border-radius:20px; font-size:13px; cursor:pointer;
    border:1.5px solid var(--border); background:white; color:var(--ink2);
    transition:all .2s; font-family:'Noto Sans SC',sans-serif;
    display:flex; align-items:center; gap:6px;
  }
  .mode-btn.active{
    background:var(--blue); color:white; border-color:var(--blue);
    box-shadow:0 2px 8px rgba(26,58,92,.25);
  }
  .mode-btn:hover:not(.active){ border-color:var(--blue2); color:var(--blue2); }

  /* SYMPTOM GRID for modern mode */
  .symptom-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;
    margin-bottom:4px;
  }
  .sym-card{
    background:white; border:1.5px solid var(--border); border-radius:8px;
    padding:14px 12px; cursor:pointer; transition:all .2s; text-align:center;
  }
  .sym-card:hover{ border-color:var(--blue2); transform:translateY(-2px); box-shadow:0 4px 12px var(--shadow); }
  .sym-card.active{ border-color:var(--blue2); background:#eef4ff; }
  .sym-icon{ font-size:26px; margin-bottom:6px; }
  .sym-name{ font-size:13px; font-weight:500; color:var(--ink); }
  .sym-desc{ font-size:10px; color:var(--ink2); margin-top:2px; line-height:1.4; }
</style>
</head>
<body>

<header>
  <div class="seal">伤寒</div>
  <div>
    <h1>伤寒论经方辨证</h1>
    <p>张仲景 · 六经辨证 · 按经或按症状查方</p>
  </div>
  <div class="hdr-right">
    <div class="version">免费版 · 太阳+阳明</div>
  </div>
</header>

<!-- 付费墙弹窗 -->
<div class="modal-overlay" id="paywallModal">
  <div class="modal">
    <div id="modalContent1">
      <div class="modal-icon">🔒</div>

        <div class="modal-feature"><span>✅</span>完整原文、煎法、禁忌</div>

      </div>
      <div class="modal-btns">
        <a class="modal-btn-buy" href="https://rootbro.lemonsqueezy.com" target="_blank">立即购买 $19.99</a>

        <button class="modal-btn-close" onclick="closeModal()">暂不，继续使用免费版</button>
      </div>
    </div>
    <div id="modalContent2" style="display:none">
      <div class="modal-icon">🔑</div>
      <div class="modal-title">输入License Key</div>
      <div class="modal-sub">输入购买后收到的Key解锁完整版</div>
      <input class="modal-key-input" id="modalKeyInput" type="text"
        placeholder="SHHL-XXXX-XXXX-XXXX" maxlength="20"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9-]/g,'')"
      />

      <div class="modal-key-loading" id="modalKeyLoading">⏳ 验证中...</div>
      <div class="modal-btns">
        <button class="modal-btn-buy" onclick="doModalUnlock()" style="background:var(--blue)">验证并解锁</button>
        <button class="modal-btn-close" onclick="showModalMain()">← 返回</button>
      </div>
    </div>
  </div>
</div>

<!-- 模式切换 -->
<div class="mode-bar">
  <button class="mode-btn active" id="modeJing" onclick="setMode('jing')">
    📚 六经辨证（专业）
  </button>
  <button class="mode-btn" id="modeZheng" onclick="setMode('zheng')">
    🔍 按症状查（普通）
  </button>
</div>

<!-- 六经模式 -->
<div id="jingMode">
  <div class="m-bar" id="mBar"></div>
</div>

<div class="container">
  <div class="disclaimer">⚕️ <strong>重要提示：</strong>本系统仅供学习参考，不构成医疗建议。请在专业中医师指导下使用。</div>
  <div class="layout">
    <div class="tree-panel">
      <div class="panel-hd"><div class="hdot"></div><h2 id="panelTitle">辨证问诊</h2></div>
      <div class="panel-bd" id="treeBody"></div>
    </div>
    <div class="result-panel">
      <div class="panel-hd"><div class="hdot"></div><h2>推荐方剂</h2></div>
      <div id="resultBody">
        <div class="empty-state">
          <div class="empty-icon">📖</div>
          <p>请在左侧<br><strong>逐步选择症状</strong><br>系统自动推荐方剂</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// 方剂库
// ─────────────────────────────────────────
const F = {
  桂枝汤:{
    mc:"var(--ty)", meridian:"太阳病", pulse:"脉浮缓",
    modern:"感冒（有汗型）、体虚感冒、产后感冒",
    pattern:"太阳中风，营卫不和",
    source:"《伤寒论》第12条",
    original:"太阳中风，阳浮而阴弱，啬啬恶寒，翕翕发热，鼻鸣干呕者，桂枝汤主之。",
    herbs:[{n:"桂枝",a:"9g",p:"去皮"},{n:"白芍",a:"9g"},{n:"炙甘草",a:"6g"},{n:"生姜",a:"9g",p:"切"},{n:"大枣",a:"12枚",p:"擘"}],
    prep:"水煎服，服后喝热粥一碗，盖被微微出汗，不可大汗淋漓。汗出病愈则止。",
    contra:"无汗体壮者禁用；酒客禁用。服后忌生冷油腻。"
  },
  桂枝加葛根汤:{
    mc:"var(--ty)", meridian:"太阳病", pulse:"脉浮缓",
    modern:"感冒有汗伴颈肩酸痛",
    pattern:"太阳中风兼项背不舒",
    source:"《伤寒论》第14条",
    original:"太阳病，项背强几几，反汗出恶风者，桂枝加葛根汤主之。",
    herbs:[{n:"葛根",a:"12g"},{n:"桂枝",a:"9g",p:"去皮"},{n:"白芍",a:"9g"},{n:"炙甘草",a:"6g"},{n:"生姜",a:"9g",p:"切"},{n:"大枣",a:"12枚",p:"擘"}],
    prep:"水煎服，服后微汗。",
    contra:"无汗者改用葛根汤；体虚者减量。"
  },
  麻黄汤:{
    mc:"var(--ty)", meridian:"太阳病", pulse:"脉浮紧",
    modern:"流感（无汗型）、急性上呼吸道感染",
    pattern:"太阳伤寒，寒邪束表",
    source:"《伤寒论》第35条",
    original:"太阳病，头痛发热，身疼腰痛，骨节疼痛，恶风无汗而喘者，麻黄汤主之。",
    herbs:[{n:"麻黄",a:"9g",p:"去节"},{n:"桂枝",a:"6g",p:"去皮"},{n:"杏仁",a:"12g",p:"去皮尖"},{n:"炙甘草",a:"3g"}],
    prep:"先煎麻黄去上沫，再入余药同煎。服后盖被微汗即止，不可大汗。",
    contra:"⚠️ 发汗力强，体虚、老人、孕妇慎用。有汗者绝对禁用。心脏病、高血压慎用。"
  },
  葛根汤:{
    mc:"var(--ty)", meridian:"太阳病", pulse:"脉浮紧",
    modern:"感冒颈肩僵硬、颈椎病急性期伴感冒",
    pattern:"太阳病，项背强几几，无汗恶风",
    source:"《伤寒论》第31条",

// ─────────────────────────────────────────
// 构建六经栏
// ─────────────────────────────────────────
function buildMBar() {
  const bar = document.getElementById('mBar');
  bar.innerHTML = '';
  MERIDIANS.forEach(m => {
    const t = document.createElement('div');
    t.className = 'm-tab' + (m.id === curMeridian.id ? ' active' : '');
    t.style.setProperty('--active-color', m.color);
    t.innerHTML = `<div class="m-dot" style="background:${m.color}"></div>${m.name}`;
    t.onclick = () => { curMeridian = m; selections = []; buildMBar(); render(); };
    bar.appendChild(t);
  });
}

// ─────────────────────────────────────────
// 主渲染：整个树展开
// ─────────────────────────────────────────
function render() {
  const m = curMeridian;
  document.getElementById('panelTitle').textContent = m.name + ' 辨证';

  const body = document.getElementById('treeBody');
  body.innerHTML = '';

  // intro
  const intro = document.createElement('div');
  intro.className = 'm-intro';
  intro.style.cssText = `background:${m.bg};border-color:${m.color}`;
  intro.innerHTML = `
    <div class="m-intro-name" style="color:${m.color}">${m.name}</div>
    <div class="m-intro-desc">${m.modern} · ${m.desc}</div>`;
  body.appendChild(intro);

  // reset
  const resetRow = document.createElement('div');
  resetRow.className = 'reset-row';
  resetRow.innerHTML = `<button class="btn-reset" onclick="resetTree()">↺ 重新选择</button>`;
  body.appendChild(resetRow);

  // render tree recursively
  const treeRoot = document.createElement('div');
  treeRoot.className = 'tree-root';
  renderLevel(m.tree, 0, treeRoot);
  body.appendChild(treeRoot);
}

function renderLevel(node, depth, container) {
  if (!node || !node.q) return;

  const levelEl = document.createElement('div');
  levelEl.className = 'tree-level';

  // question
  const qEl = document.createElement('div');
  qEl.className = 'level-question';
  qEl.textContent = node.q;
  levelEl.appendChild(qEl);

  const opts = node.opts || [];
  if (opts.length === 0) { container.appendChild(levelEl); return; }

  const selectedIdx = selections[depth];

  opts.forEach((opt, idx) => {
    const isSelected = selectedIdx === idx;
    const hasResult = !!opt.r;

    // option button
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (isSelected ? (hasResult ? ' result-selected' : ' selected') : '');
    btn.innerHTML = `
      <div class="opt-radio"></div>
      <div class="opt-label-wrap">
        <span class="opt-main">${opt.l}</span>
        ${opt.s ? `<span class="opt-sub">${opt.s}</span>` : ''}
      </div>`;
    btn.onclick = () => {
      // trim selections to this depth and set
      selections = selections.slice(0, depth);
      selections[depth] = idx;
      render();
      if (opt.r) showResult(opt.r);
      else showResult(null);
    };
    levelEl.appendChild(btn);

    // if selected and has children, render children indented
    if (isSelected && opt.next) {
      const childWrap = document.createElement('div');
      childWrap.className = 'opt-children';
      renderLevel(opt.next, depth + 1, childWrap);
      levelEl.appendChild(childWrap);
    }

    // if selected and has result, show result
    if (isSelected && opt.r) {
      showResult(opt.r);
    }
  });

  container.appendChild(levelEl);
}

// ─────────────────────────────────────────

function showResult(name) {
  const body = document.getElementById('resultBody');
  if (!name) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📖</div>
        <p>请在左侧<br><strong>逐步选择症状</strong><br>系统自动推荐方剂</p>
      </div>`;
    return;
  }
  const f = F[name];
  if (!f) { body.innerHTML = `<div style="padding:20px;font-size:15px">推荐：${name}</div>`; return; }

  const herbsHtml = f.herbs.map(h => `
    <div class="herb-tag">
      <b>${h.n}</b>
      <span>${h.a}${h.p ? ' · '+h.p : ''}</span>
    </div>`).join('');

  body.innerHTML = `
    <div class="rc-header">
      <div class="rc-badge" style="background:${f.mc}">${name.slice(0,2)}</div>
      <div>
        <div class="rc-name">${name}</div>
        <div class="rc-modern">${f.modern}</div>
        <span class="rc-pill" style="background:${f.mc}">${f.meridian} · ${f.pulse}</span>
      </div>
    </div>
    <div class="rc-body">
      <div class="sec">
        <div class="sec-lbl">药物组成</div>
        <div class="herb-grid">${herbsHtml}</div>
      </div>
      <div class="sec">
        <div class="sec-lbl">煎服方法</div>
        <div class="prep-box">${f.prep}</div>
      </div>
      <div class="sec">
        <div class="sec-lbl">原文出处</div>
        <div class="classic-box">${f.original}<div class="classic-src">— ${f.source} · ${f.pattern}</div></div>
      </div>
      <div class="sec">
        <div class="sec-lbl">禁忌注意</div>
        <div class="warn-box">${f.contra}</div>
      </div>
    </div>`;
}

function resetTree() {

    grid.className = 'symptom-grid';
    SYMPTOM_CATS.forEach((cat, i) => {
      const card = document.createElement('div');
      card.className = 'sym-card';
      card.innerHTML = `<div class="sym-icon">${cat.icon}</div><div class="sym-name">${cat.name}</div><div class="sym-desc">${cat.desc}</div>`;
      card.onclick = () => { zhengCat = i; zhengSelections = []; renderZheng(); showResult(null); };
      grid.appendChild(card);
    });
    body.appendChild(grid);
  } else {
    // show decision tree for chosen category
    const cat = SYMPTOM_CATS[zhengCat];

    // category header
    const hdr = document.createElement('div');
    hdr.className = 'm-intro';
    hdr.style.cssText = 'background:#f0f4ff;border-color:#a0b8e0;margin-bottom:14px;';
    hdr.innerHTML = `<div class="m-intro-name" style="color:var(--blue)">${cat.icon} ${cat.name}</div><div class="m-intro-desc">${cat.desc}</div>`;
    body.appendChild(hdr);

    // render tree
    const treeRoot = document.createElement('div');
    treeRoot.className = 'tree-root';
    renderZhengLevel(cat.tree, 0, treeRoot);
    body.appendChild(treeRoot);
  }
}

function renderZhengLevel(node, depth, container) {
  if (!node || !node.q) return;
  const levelEl = document.createElement('div');
  levelEl.className = 'tree-level';

  const qEl = document.createElement('div');
  qEl.className = 'level-question';
  qEl.textContent = node.q;
  levelEl.appendChild(qEl);

  const opts = node.opts || [];
  if (opts.length === 0) { container.appendChild(levelEl); return; }

  const selectedIdx = zhengSelections[depth];
  opts.forEach((opt, idx) => {
    const isSelected = selectedIdx === idx;
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (isSelected ? (opt.r ? ' result-selected' : ' selected') : '');
    btn.innerHTML = `<div class="opt-radio"></div><div class="opt-label-wrap"><span class="opt-main">${opt.l}</span>${opt.s?`<span class="opt-sub">${opt.s}</span>`:''}</div>`;
    btn.onclick = () => {
      zhengSelections = zhengSelections.slice(0, depth);
      zhengSelections[depth] = idx;
      renderZheng();
      if (opt.r) showResult(opt.r);
      else showResult(null);
    };
    levelEl.appendChild(btn);
    if (isSelected && opt.next) {
      const childWrap = document.createElement('div');
      childWrap.className = 'opt-children';
      renderZhengLevel(opt.next, depth+1, childWrap);
      levelEl.appendChild(childWrap);
    }
    if (isSelected && opt.r) showResult(opt.r);
  });
  container.appendChild(levelEl);
}

function resetZheng() {
  zhengCat = null;
  zhengSelections = [];
  renderZheng();
  showResult(null);
}

// ─────────────────────────────────────────
// 付费墙配置
// ─────────────────────────────────────────
const FREE_MERIDIANS = ["太阳", "阳明"];
const FREE_SYMPTOM_CATS = ["感冒发烧", "感冒后遗症", "咳嗽气喘", "高热口渴", "便秘腹胀"];
const API_URL = "https://shanghan-api.oceanyc.workers.dev";

function isFreeMeridian(id) { return FREE_MERIDIANS.includes(id); }
function isFreeSymCat(name) { return FREE_SYMPTOM_CATS.includes(name); }

// ─────────────────────────────────────────
// 付费墙弹窗
// ─────────────────────────────────────────
function showPaywall(title) {
  document.getElementById('modalSubText').textContent = title || '完整版包含六经全部内容';
  document.getElementById('modalContent1').style.display = 'block';
  document.getElementById('modalContent2').style.display = 'none';
  document.getElementById('paywallModal').classList.add('show');
}
function closeModal() {
  document.getElementById('paywallModal').classList.remove('show');
}
function showKeyInput() {
  document.getElementById('modalContent1').style.display = 'none';
  document.getElementById('modalContent2').style.display = 'block';
  document.getElementById('modalKeyInput').value = '';
  document.getElementById('modalKeyError').textContent = '';
}
function showModalMain() {
  document.getElementById('modalContent1').style.display = 'block';
  document.getElementById('modalContent2').style.display = 'none';
}

async function doModalUnlock() {
  const key = document.getElementById('modalKeyInput').value.trim();
  const errEl = document.getElementById('modalKeyError');
  const loadEl = document.getElementById('modalKeyLoading');
  if (!key) { errEl.textContent = '请输入Key'; return; }
  errEl.textContent = '';
  loadEl.style.display = 'block';
  try {
    const res = await fetch(`${API_URL}/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    const data = await res.json();
    if (data.success) {
      closeModal();
      // 跳转到付费版HTML（用户已有完整版文件）
      alert('✅ Key验证成功！\n\n请使用完整版文件（shanghan_paid_shell.html）\n并输入此Key解锁所有内容。');
    } else {
      errEl.textContent = data.error || '验证失败';
    }
  } catch(e) {
    errEl.textContent = '网络错误，请重试';
  } finally {
    loadEl.style.display = 'none';
  }
}

// 点击modal外部关闭
document.getElementById('paywallModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─────────────────────────────────────────
// 更新 buildMBar 加锁
// ─────────────────────────────────────────
function buildMBar() {
  const bar = document.getElementById('mBar');
  bar.innerHTML = '';
  MERIDIANS.forEach(m => {
    const locked = !isFreeMeridian(m.id);
    const t = document.createElement('div');
    t.className = 'm-tab' + (m.id === curMeridian.id ? ' active' : '') + (locked ? ' locked' : '');
    t.style.setProperty('--active-color', m.color);
    t.innerHTML = `<div class="m-dot" style="background:${m.color}"></div>${m.name}${locked ? '<span class="lock-icon">🔒</span>' : ''}`;
    t.onclick = () => {
      if (locked) {
        showPaywall(`${m.name}包含${m.modern}`);
        return;
      }
      curMeridian = m; selections = []; buildMBar(); render();
    };
    bar.appendChild(t);
  });
}

// ─────────────────────────────────────────
// 初始化
// ─────────────────────────────────────────
// 覆盖 renderZheng 的症状网格，加锁
const _origRenderZheng = renderZheng;
function renderZheng() {
  const body = document.getElementById('treeBody');
  body.innerHTML = '';
  const resetRow = document.createElement('div');
  resetRow.className = 'reset-row';
  resetRow.innerHTML = `<button class="btn-reset" onclick="resetZheng()">↺ 重新选择</button>`;
  body.appendChild(resetRow);

  if (zhengCat === null) {
    const label = document.createElement('div');
    label.className = 'level-question';
    label.textContent = '你主要想查哪类问题？';
    body.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'symptom-grid';
    SYMPTOM_CATS.forEach((cat, i) => {
      const locked = !isFreeSymCat(cat.name);
      const card = document.createElement('div');
      card.className = 'sym-card' + (locked ? ' locked' : '');
      card.innerHTML = `
        <div class="sym-icon">${cat.icon}</div>
        <div class="sym-name">${cat.name}</div>
        <div class="sym-desc">${cat.desc}</div>
        ${locked ? '<div class="lock-badge">🔒 完整版</div>' : ''}`;
      card.onclick = () => {
        if (locked) { showPaywall(`「${cat.name}」需要完整版解锁`); return; }
        zhengCat = i; zhengSelections = []; renderZheng(); showResult(null);
      };
      grid.appendChild(card);
    });
    body.appendChild(grid);
  } else {
    const cat = SYMPTOM_CATS[zhengCat];
    const hdr = document.createElement('div');
    hdr.className = 'm-intro';
    hdr.style.cssText = 'background:#f0f4ff;border-color:#a0b8e0;margin-bottom:14px;';
    hdr.innerHTML = `<div class="m-intro-name" style="color:var(--blue)">${cat.icon} ${cat.name}</div><div class="m-intro-desc">${cat.desc}</div>`;
    body.appendChild(hdr);
    const treeRoot = document.createElement('div');
    treeRoot.className = 'tree-root';
    renderZhengLevel(cat.tree, 0, treeRoot);
    body.appendChild(treeRoot);
  }
}

buildMBar();
render();
</script>
