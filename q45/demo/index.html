<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q45 Scenario Demo — RootBro</title>
  <meta name="description" content="Choose a relationship scenario and review a calm Q45 diagnosis card with a 60-second audio preview." />
  <style>
    :root{--bg:#080808;--panel:rgba(15,15,15,.88);--line:rgba(200,164,93,.18);--text:#f4efe4;--muted:#b8ad9a;--gold:#c8a45d;--gold2:#e2c985;--green:#2d6a4f;--radius-lg:24px;--radius-md:16px;--shadow:0 18px 60px rgba(0,0,0,.42);--shadow-soft:0 10px 28px rgba(0,0,0,.30)}*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:Inter,Montserrat,-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at 18% 0%,rgba(200,164,93,.10),transparent 32%),radial-gradient(circle at 82% 100%,rgba(45,106,79,.13),transparent 34%),linear-gradient(to bottom,#080808,#0b0b0c 52%,#070707);line-height:1.7;-webkit-font-smoothing:antialiased}body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.24;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(circle at center,black,transparent 72%)}a{color:inherit;text-decoration:none}.top-nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:18px 5vw;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.82),rgba(0,0,0,0))}.brand{font-family:Georgia,"Times New Roman",serif;font-size:28px;color:var(--gold2);letter-spacing:.04em}.nav-links{display:flex;gap:26px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}.nav-links a:hover{color:var(--gold2)}.app-shell{min-height:100vh;display:grid;grid-template-columns:minmax(320px,440px) minmax(0,1fr);gap:24px;padding:96px 24px 24px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow);backdrop-filter:blur(14px)}.panel-left{display:grid;grid-template-rows:auto auto minmax(0,1fr);min-height:0;overflow:hidden}.panel-right{padding:22px;display:grid;grid-template-rows:auto auto minmax(0,1fr);gap:14px;min-height:0}.panel-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.sticky-header{position:sticky;top:0;z-index:5;padding:24px 22px 16px;background:linear-gradient(to bottom,rgba(15,15,15,.98) 72%,rgba(15,15,15,.72));border-bottom:1px solid var(--line)}.eyebrow{margin:0;font-size:.74rem;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);font-weight:700}.panel-header h1,.panel-header h2{margin:4px 0 0;font-family:Georgia,"Times New Roman",serif;font-size:clamp(1.42rem,1.9vw,1.9rem);line-height:1.18;font-weight:500;letter-spacing:-.01em;color:var(--text)}.panel-header p{margin:8px 0 0;color:var(--muted);font-size:.96rem}.status{margin:2px 0 0;color:#9cc9b1;font-size:.82rem;font-weight:700;white-space:nowrap;padding:5px 10px;border-radius:999px;background:rgba(45,106,79,.14);border:1px solid rgba(45,106,79,.34)}.list-label{margin:12px 22px 0;color:var(--muted);font-size:.84rem;font-weight:650;letter-spacing:.04em}.scenario-list{overflow-y:auto;min-height:0;padding:14px 16px 18px;display:grid;gap:12px}.scenario-btn{width:100%;border:1px solid rgba(200,164,93,.14);border-radius:var(--radius-md);background:rgba(255,255,255,.026);padding:14px 14px 13px;text-align:left;color:inherit;cursor:pointer;position:relative;transition:transform 140ms ease,box-shadow 140ms ease,border-color 140ms ease,background 140ms ease;box-shadow:var(--shadow-soft)}.scenario-btn::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:4px;border-radius:999px;background:transparent;transition:background 140ms ease}.scenario-btn:hover{transform:translateY(-1px);border-color:rgba(226,201,133,.42);background:rgba(255,255,255,.044)}.scenario-btn:hover::before{background:rgba(200,164,93,.38)}.scenario-btn.active{border-color:rgba(226,201,133,.55);background:rgba(200,164,93,.08);box-shadow:0 14px 34px rgba(0,0,0,.38)}.scenario-btn.active::before{background:var(--gold)}.scenario-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.scenario-hook{display:block;font-size:1.02rem;font-weight:760;line-height:1.35;letter-spacing:-.01em;color:var(--text)}.scenario-subtitle{display:block;margin-top:6px;font-size:.91rem;color:var(--muted);line-height:1.45}.scenario-ref{flex:0 0 auto;font-size:.71rem;font-weight:740;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);background:rgba(200,164,93,.10);border:1px solid rgba(200,164,93,.22);padding:4px 8px;border-radius:999px;margin-top:2px}.cta-bar{position:sticky;top:76px;z-index:4;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:10px;border-radius:14px;background:rgba(255,255,255,.035);border:1px solid var(--line)}.cta-btn{display:inline-flex;align-items:center;justify-content:center;text-align:center;min-height:42px;border-radius:999px;text-decoration:none;font-size:.82rem;font-weight:700;line-height:1.2;padding:9px 10px;letter-spacing:.03em}.cta-primary{background:var(--gold);color:#111;border:1px solid var(--gold);box-shadow:0 8px 18px rgba(200,164,93,.20)}.cta-primary:hover{background:var(--gold2);border-color:var(--gold2)}.cta-secondary{background:rgba(255,255,255,.035);color:var(--gold2);border:1px solid rgba(200,164,93,.28)}.cta-secondary:hover{background:rgba(200,164,93,.08)}.cta-tertiary{appearance:none;cursor:pointer;background:transparent;color:var(--text);border:1px dashed rgba(200,164,93,.45)}.cta-tertiary:hover:not(:disabled){background:rgba(200,164,93,.08)}.cta-tertiary:disabled{opacity:.5;cursor:not-allowed}.preview-audio{grid-column:1/-1;width:100%;height:34px;opacity:.92;accent-color:var(--gold)}.card-view{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-soft);padding:24px;overflow:auto;min-height:0}.card-empty{color:var(--muted);font-size:.98rem;padding:10px 2px}.card-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.card-title{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:1.45rem;font-weight:500;letter-spacing:-.01em;color:var(--gold2)}.card-meta{margin:2px 0 0;font-size:.82rem;color:var(--muted);white-space:nowrap}.section{border-top:1px solid rgba(200,164,93,.12);padding-top:14px;margin-top:14px}.section h3{margin:0 0 8px;font-size:.82rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gold)}.section p,.section li{margin:0;font-size:1rem;color:rgba(244,239,228,.92)}.section ol{margin:0;padding-left:18px}.section li{margin:6px 0}.risk-pill{display:inline-block;padding:6px 11px;border-radius:999px;font-weight:740;border:1px solid rgba(200,164,93,.25);background:rgba(200,164,93,.09);color:var(--gold2);white-space:nowrap}@media(max-width:1080px){.cta-bar{grid-template-columns:1fr}}@media(max-width:980px){.top-nav{position:static;flex-direction:column;align-items:flex-start;gap:14px}.app-shell{grid-template-columns:1fr;padding:18px;gap:14px}.sticky-header{position:static}.panel-right{padding:18px}.scenario-list{max-height:320px}.cta-bar{position:static}}@media(max-width:640px){.app-shell{padding:12px}.panel-header{flex-direction:column;align-items:flex-start}.card-title-row{flex-direction:column;align-items:flex-start}.nav-links{flex-wrap:wrap;gap:14px}}
  </style>
</head>
<body>
  <header class="top-nav"><a class="brand" href="/">RootBro</a><nav class="nav-links"><a href="/q45">Q45</a><a href="/music">Music</a><a href="/tcm">TCM</a><a href="/lab">Lab</a><a href="/srt">SRT</a></nav></header>
  <main class="app-shell">
    <section class="panel panel-left"><header class="panel-header sticky-header"><div><p class="eyebrow">Q45 Workspace</p><h1>Scenario Navigator</h1><p>Select a situation and review a calm coaching diagnosis card.</p></div></header><p class="list-label">Browse by situation</p><div id="scenarioList" class="scenario-list" aria-live="polite"></div></section>
    <section class="panel panel-right"><header class="panel-header right-header"><div><p class="eyebrow">Relationship Coaching Notes</p><h2>Diagnosis Card</h2></div><p id="statusLine" class="status">Ready</p></header><div class="cta-bar" role="group" aria-label="Listening actions"><button id="previewBtn" type="button" class="cta-btn cta-tertiary" disabled>Play audio preview</button><a id="audiobookLink" class="cta-btn cta-primary" href="https://play.google.com/store/audiobooks/details/Dr_RootBro_Marriage_Confusion_Revealing_What_Your?id=AQAAAEDqD1RPrM" target="_blank" rel="noopener noreferrer">🎧 Listen Full Audiobook</a><a id="kindleLink" class="cta-btn cta-secondary" href="https://www.amazon.com/dp/B0GCQ6CJ1D" target="_blank" rel="noopener noreferrer">📖 Read on Kindle</a><audio id="previewAudio" preload="none" class="preview-audio" controls></audio></div><div id="cardView" class="card-view" aria-live="polite"><div class="card-empty">Choose a scenario to view the diagnosis card.</div></div></section>
  </main>
  <script>
const scenarioListEl=document.getElementById("scenarioList"),cardViewEl=document.getElementById("cardView"),statusLineEl=document.getElementById("statusLine"),previewBtn=document.getElementById("previewBtn"),previewAudioEl=document.getElementById("previewAudio"),audiobookLinkEl=document.getElementById("audiobookLink"),kindleLinkEl=document.getElementById("kindleLink");
const DEFAULT_AUDIOBOOK_URL="https://play.google.com/store/audiobooks/details/Dr_RootBro_Marriage_Confusion_Revealing_What_Your?id=AQAAAEDqD1RPrM",DEFAULT_KINDLE_URL="https://www.amazon.com/dp/B0GCQ6CJ1D";
let scenarios=[
{id:"q44",title:"There is a long-term imbalance of effort. What should I do?",hook:"I feel like I'm carrying this relationship alone.",subtitle:"I'm exhausted but scared to stop trying.",q_ref:"Category 13 / Q44",card_text:"DIAGNOSIS: Chronic imbalance erodes respect.\nRISK LEVEL: High if unacknowledged.\n3-STEP ACTION (tonight): State the imbalance factually. Request one specific change. Set a timeframe.\nDON'T DO: Over-function.\nNEXT STEP: Evaluate behavior shift.",preview_url:"audio/q44.mp3"},
{id:"q8",title:"My partner keeps saying they're too tired. What should I do?",hook:"They're too tired for intimacy… but never too tired for their phone.",subtitle:"I feel rejected, but I don't want to pressure them.",q_ref:"Category 2 / Q8",card_text:"DIAGNOSIS: Repeated rejection signals avoidance, not just fatigue.\nRISK LEVEL: Medium\n3-STEP ACTION (tonight): Express impact, not accusation. Ask what drains them. Propose protected time.\nDON'T DO: Beg or shut down.\nNEXT STEP: Watch effort, not words.",preview_url:"audio/q08.mp3"},
{id:"q1",title:"We used to talk for hours. Now we're running out of things to say.",hook:"We don't fight. We just… don't talk anymore.",subtitle:"It feels quiet in a way that scares me.",q_ref:"Category 1 / Q1",card_text:"DIAGNOSIS: Shared novelty faded; intentional connection missing.\nRISK LEVEL: Medium\n3-STEP ACTION (tonight): Introduce one new activity. Ask one deeper question. Remove devices.\nDON'T DO: Call it failure.\nNEXT STEP: Rebuild shared meaning.",preview_url:"audio/q01.mp3"},
{id:"q12",title:"My partner is always busy and doesn't invest effort. Is there hope?",hook:"They're always busy… just never too busy for other things.",subtitle:"I feel like I'm last on the list.",q_ref:"Category 3 / Q12",card_text:"DIAGNOSIS: Chronic low investment predicts withdrawal.\nRISK LEVEL: High if unchanged after discussion.\n3-STEP ACTION (tonight): Ask where the relationship ranks. Request scheduled time. Observe reaction.\nDON'T DO: Compete with work.\nNEXT STEP: Measure priority by behavior.",preview_url:"audio/q12.mp3"},
{id:"q31",title:"My partner interacts frequently with the opposite sex online. Am I petty?",hook:"They laugh and comment with others… but I'm the one called insecure.",subtitle:"I don't want to seem controlling.",q_ref:"Category 7 / Q31",card_text:"DIAGNOSIS: Boundaries differ; secrecy defines risk.\nRISK LEVEL: Medium (High if hidden)\n3-STEP ACTION (tonight): Share how it feels. Define mutual boundaries. Ask for transparency.\nDON'T DO: Spy or accuse.\nNEXT STEP: Observe consistency.",preview_url:"audio/q31.mp3"},
{id:"q6",title:"Our intimacy dropped from 3x a week to once a month. Is this normal?",hook:"We used to not keep our hands off each other. Now even once a month feels forced.",subtitle:"I don't know if this is just life… or something breaking.",q_ref:"Category 2 / Q6",card_text:"DIAGNOSIS: Desire decline is common, but consistent avoidance signals emotional drift.\nRISK LEVEL: Medium (Higher if discussion is avoided)\n3-STEP ACTION (tonight): Name the shift calmly. Ask how they experience it. Suggest one small reconnection ritual.\nDON'T DO: Compare to the past or guilt-trip.\nNEXT STEP: Track emotional closeness, not frequency.",preview_url:"audio/q06.mp3"},
{id:"q7",title:"I've lost all sexual desire for my partner. Should we break up?",hook:"I still love them… I just don't want them physically anymore.",subtitle:"Everything works — except attraction.",q_ref:"Category 2 / Q7",card_text:"DIAGNOSIS: Loss of desire often reflects emotional blockage, not just physical change.\nRISK LEVEL: High if resentment is silent.\n3-STEP ACTION (tonight): Identify when desire last felt alive. Name one blocked emotion. Share that, not a verdict.\nDON'T DO: Declare the relationship dead immediately.\nNEXT STEP: Evaluate safety vs. polarity.",preview_url:"audio/q07.mp3"},
{id:"q9",title:"We're sexually mismatched, but I'm embarrassed to bring it up.",hook:"I know we're not aligned in bed… I just don't know how to say it.",subtitle:"I'm scared honesty might make it worse.",q_ref:"Category 2 / Q9",card_text:"DIAGNOSIS: Silence creates quiet resentment.\nRISK LEVEL: Medium\n3-STEP ACTION (tonight): Frame it as curiosity. Share preference, not criticism. Invite feedback.\nDON'T DO: Mock or compare.\nNEXT STEP: Normalize adjustment as teamwork.",preview_url:"audio/q09.mp3"},
{id:"q10",title:"They cheated and blamed our lack of sex. Is that valid?",hook:"They cheated… and somehow it became my fault.",subtitle:"I'm hurt, confused, and starting to question myself.",q_ref:"Category 2 / Q10",card_text:"DIAGNOSIS: Dissatisfaction explains vulnerability, not betrayal.\nRISK LEVEL: High\n3-STEP ACTION (tonight): Separate cause from choice. Ask for accountability clarity. Pause big decisions.\nDON'T DO: Accept blame to save the relationship.\nNEXT STEP: Evaluate remorse vs. rationalization.",preview_url:"audio/q10.mp3"},
{id:"q11",title:"My partner's temper is getting worse. Is intimacy related?",hook:"They snap at me over nothing lately. I don't recognize them.",subtitle:"Is this stress… or distance?",q_ref:"Category 2 / Q11",card_text:"DIAGNOSIS: Suppressed needs often convert into irritability.\nRISK LEVEL: Medium (High if aggression escalates)\n3-STEP ACTION (tonight): Ask what feels missing. Listen without defending. Suggest stress outlet.\nDON'T DO: Diagnose them mid-argument.\nNEXT STEP: Track patterns.",preview_url:"audio/q11.mp3"},
{id:"q39",title:"They say I'm overthinking. How should I respond?",hook:"Every time I open up, I get told I'm overthinking.",subtitle:"I'm starting to doubt myself.",q_ref:"Category 9 / Q39",card_text:"DIAGNOSIS: Dismissal signals emotional disconnect.\nRISK LEVEL: Medium\n3-STEP ACTION (tonight): Say you need reassurance, not correction. Clarify fear. Ask for response.\nDON'T DO: Escalate into proving you're right.\nNEXT STEP: Assess emotional responsiveness.",preview_url:"audio/q39.mp3"}
];
let currentScenario=null;
function setStatus(m){if(statusLineEl)statusLineEl.textContent=m}function getQCode(q){const m=String(q).match(/Q\d+/i);return m?m[0].toUpperCase():""}function normalizeKey(k){return k.trim().toUpperCase().replace(/[’']/g,"'").replace(/\s+/g," ")}function parseCardText(t){const p={diagnosis:"",riskLevel:"",action:"",dontDo:"",nextStep:""};t.split("\n").map(l=>l.trim()).filter(Boolean).forEach(line=>{const i=line.indexOf(":");if(i===-1)return;const key=normalizeKey(line.slice(0,i)),v=line.slice(i+1).trim();if(key==="DIAGNOSIS")p.diagnosis=v;if(key==="RISK LEVEL")p.riskLevel=v;if(key.startsWith("3-STEP ACTION"))p.action=v;if(key==="DON'T DO")p.dontDo=v;if(key==="NEXT STEP")p.nextStep=v});return p}function parseActionItems(t){if(!t)return[];return t.replace(/^\s*\d+\)\s*/,"").split(/\s*,\s*(?=\d+\))/).map(i=>i.replace(/^\d+\)\s*/,"").trim()).filter(Boolean)}function setActiveButton(b){scenarioListEl.querySelectorAll(".scenario-btn").forEach(x=>x.classList.remove("active"));if(b)b.classList.add("active")}function createSection(title,node){const s=document.createElement("section");s.className="section";const h=document.createElement("h3");h.textContent=title;s.appendChild(h);s.appendChild(node);return s}
function renderCardView(sc){const p=parseCardText(sc.card_text);cardViewEl.innerHTML="";const row=document.createElement("div");row.className="card-title-row";const title=document.createElement("h3");title.className="card-title";title.textContent=sc.title;const meta=document.createElement("p");meta.className="card-meta";meta.textContent=sc.q_ref;row.appendChild(title);row.appendChild(meta);cardViewEl.appendChild(row);const wrap=document.createElement("div");wrap.className="card-sections";if(p.diagnosis){const x=document.createElement("p");x.textContent=p.diagnosis;wrap.appendChild(createSection("What's happening",x))}if(p.riskLevel){const x=document.createElement("span");x.className="risk-pill";x.textContent=p.riskLevel;wrap.appendChild(createSection("Risk level",x))}if(p.action){const items=parseActionItems(p.action);if(items.length){const ol=document.createElement("ol");ol.className="action-list";items.forEach(item=>{const li=document.createElement("li");li.textContent=item;ol.appendChild(li)});wrap.appendChild(createSection("What to do tonight",ol))}else{const x=document.createElement("p");x.textContent=p.action;wrap.appendChild(createSection("What to do tonight",x))}}if(p.dontDo){const x=document.createElement("p");x.textContent=p.dontDo;wrap.appendChild(createSection("Avoid",x))}if(p.nextStep){const x=document.createElement("p");x.textContent=p.nextStep;wrap.appendChild(createSection("Next step",x))}cardViewEl.appendChild(wrap)}
function updatePreviewState(){const u=currentScenario?.preview_url,has=Boolean(u);previewBtn.disabled=!has;if(has){previewAudioEl.pause();previewAudioEl.src=u;previewAudioEl.load()}else{previewAudioEl.removeAttribute("src");previewAudioEl.load()}}function renderScenarioButtons(){scenarioListEl.innerHTML="";scenarios.forEach((sc,idx)=>{const btn=document.createElement("button");btn.type="button";btn.className="scenario-btn";const top=document.createElement("span");top.className="scenario-top";const hook=document.createElement("span");hook.className="scenario-hook";hook.textContent=sc.hook||sc.title;const ref=document.createElement("span");ref.className="scenario-ref";ref.textContent=getQCode(sc.q_ref);top.appendChild(hook);if(ref.textContent)top.appendChild(ref);const sub=document.createElement("span");sub.className="scenario-subtitle";sub.textContent=sc.subtitle||"";btn.appendChild(top);btn.appendChild(sub);btn.addEventListener("click",()=>{currentScenario=sc;renderCardView(sc);setActiveButton(btn);updatePreviewState();setStatus("Ready")});scenarioListEl.appendChild(btn);if(idx===0)setTimeout(()=>btn.click(),0)})}if(previewBtn&&previewAudioEl){previewBtn.addEventListener("click",async()=>{const u=currentScenario?.preview_url;if(!u){setStatus("No preview");return}try{await previewAudioEl.play();setStatus("Playing preview")}catch(e){setStatus("Preview unavailable")}})}audiobookLinkEl.href=DEFAULT_AUDIOBOOK_URL;kindleLinkEl.href=DEFAULT_KINDLE_URL;renderScenarioButtons();
  </script>
</body>
</html>
